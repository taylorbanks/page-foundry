<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>OG card source (run state; only the capture deploys)</title>
<link rel="stylesheet" href="theme.css">
<style>
  html, body { margin: 0; }
  .stage {
    width: 1200px; height: 630px; box-sizing: border-box;
    background: var(--field); color: var(--ink);
    font-family: var(--display);
    display: flex; flex-direction: column; justify-content: center;
    padding: 0 96px;
  }
  .name {
    color: var(--accent); font-size: 28px; letter-spacing: .08em;
    text-transform: uppercase; margin: 0 0 24px;
  }
  .h1 { font-size: 64px; line-height: 1.1; margin: 0; max-width: 900px; }
  .rule { width: 120px; height: 6px; background: var(--accent); margin-top: 40px; }
</style>
</head>
<body>
<div class="stage">
  <p class="name">Logship</p>
  <p class="h1">One command turns raw logs into a report</p>
  <div class="rule"></div>
</div>
</body>
</html>
